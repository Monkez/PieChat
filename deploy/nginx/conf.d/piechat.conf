# =============================================================================
# PieChat — Nginx Site Configuration
# =============================================================================
# Replace YOUR_DOMAIN with your actual domain (e.g., chat.example.com)
# The deploy script will do this automatically.
# =============================================================================

# --- HTTP → HTTPS redirect + ACME challenge ---
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS server ---
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Matrix Client API ──────────────────────────────────────────────────
    location /_matrix/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://dendrite:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Media upload size (match Dendrite 50MB config)
        client_max_body_size 50M;

        # WebSocket support (for sync)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-polling support (Matrix sync)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ─── Matrix Server-to-Server Federation ─────────────────────────────────
    location /_matrix/federation/ {
        proxy_pass http://dendrite:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # ─── Matrix Well-Known (required for federation/client discovery) ───────
    location /.well-known/matrix/ {
        default_type application/json;

        location = /.well-known/matrix/server {
            return 200 '{"m.server": "YOUR_DOMAIN:443"}';
        }
        location = /.well-known/matrix/client {
            # CORS for client discovery
            add_header Access-Control-Allow-Origin "*" always;
            return 200 '{"m.homeserver": {"base_url": "https://YOUR_DOMAIN"}}';
        }
    }

    # ─── Auth Service API ───────────────────────────────────────────────────
    location /auth/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://auth-service:4000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Frontend (Next.js) ─────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, but good practice)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
