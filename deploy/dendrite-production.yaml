# =============================================================================
# PieChat — Dendrite Production Config Template
# =============================================================================
# This file is used by the deploy script.
# Replace YOUR_DOMAIN and REGISTRATION_SECRET before starting.
# =============================================================================

version: 2

global:
  server_name: YOUR_DOMAIN

  private_key: matrix_key.pem

  key_validity_period: 168h0m0s

  cache:
    max_size_estimated: 1gb
    max_age: 1h

  well_known_server_name: "YOUR_DOMAIN:443"
  well_known_client_name: "https://YOUR_DOMAIN"

  trusted_third_party_id_servers:
    - matrix.org
    - vector.im

  # Disable federation for private deployment (enable later if needed)
  disable_federation: true

  presence:
    enable_inbound: false
    enable_outbound: false

  report_stats:
    enabled: false

  server_notices:
    enabled: false
    local_part: "_server"
    display_name: "Server Alerts"
    avatar_url: ""
    room_name: "Server Alerts"

  jetstream:
    addresses: []
    disable_tls_validation: false
    storage_path: ./
    topic_prefix: Dendrite

  metrics:
    enabled: false

  dns_cache:
    enabled: false
    cache_size: 256
    cache_lifetime: "5m"

app_service_api:
  database:
    connection_string: file:dendrite-appservice.db
  disable_tls_validation: false
  legacy_auth: false
  legacy_paths: false
  config_files: []

client_api:
  registration_disabled: false
  guests_disabled: true
  registration_shared_secret: "REGISTRATION_SECRET"

  enable_registration_captcha: false
  recaptcha_public_key: ""
  recaptcha_private_key: ""
  recaptcha_bypass_secret: ""

  turn:
    turn_user_lifetime: "5m"
    turn_uris: []
    turn_shared_secret: ""

  rate_limiting:
    enabled: true
    threshold: 20
    cooloff_ms: 500
    exempt_user_ids: []

federation_api:
  database:
    connection_string: file:dendrite-federationapi.db
  send_max_retries: 16
  disable_tls_validation: false
  disable_http_keepalives: false
  key_perspectives:
    - server_name: matrix.org
      keys:
        - key_id: ed25519:auto
          public_key: Noi6WqcDj0QmPxCNQqgezwTlBKrfqehY1u2FyWP9uYw
        - key_id: ed25519:a_RXGa
          public_key: l8Hft5qXKn1vfHrg3p4+W8gELQVo8N13JkluMfmn2sQ
  prefer_direct_fetch: false

media_api:
  database:
    connection_string: file:dendrite-mediaapi.db
  base_path: ./media_store
  # Increase to 50MB for production (video support)
  max_file_size_bytes: 52428800
  dynamic_thumbnails: false
  max_thumbnail_generators: 10
  thumbnail_sizes:
    - width: 32
      height: 32
      method: crop
    - width: 96
      height: 96
      method: crop
    - width: 640
      height: 480
      method: scale

mscs:
  database:
    connection_string: file:dendrite-mscs.db
  mscs: []

sync_api:
  database:
    connection_string: file:dendrite-syncapi.db
  real_ip_header: X-Real-IP
  search:
    enabled: true
    index_path: "./searchindex"
    language: "vi"

user_api:
  account_database:
    connection_string: file:dendrite-userapi-accounts.db
  bcrypt_cost: 10
  auto_join_rooms: []

tracing:
  enabled: false

logging:
  - type: std
    level: info

key_server:
  database:
    connection_string: file:dendrite-keyserver.db

room_server:
  database:
    connection_string: file:dendrite-roomserver.db

relay_api:
  database:
    connection_string: file:dendrite-relayapi.db
